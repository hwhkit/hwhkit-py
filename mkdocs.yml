site_name: hwhkit
site_url: https://hwhkit.louishwh.tech
site_description: Production-ready Python framework for trading services and microservices
site_author: louishwh
repo_url: https://github.com/hwhkit/hwhkit-py
repo_name: hwhkit/hwhkit-py
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.tracking
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Concepts:
      - concepts/index.md
      - Bootstrap: concepts/bootstrap.md
      - IntegrationProvider: concepts/integration-provider.md
      - Contracts & Adapters: concepts/contracts.md
      - AppContext: concepts/app-context.md
      - Errors: concepts/errors.md
      - Observability: concepts/observability.md
      - Configuration: concepts/configuration.md
      - Testing: concepts/testing.md
  - Integrations:
      - integrations/index.md
      - Postgres: integrations/postgres.md
      - Redis: integrations/redis.md
      - Scheduler: integrations/scheduler.md
      - NATS: integrations/nats.md
      - LLM: integrations/llm.md
  - Contracts: contracts/index.md
  - Recipes:
      - recipes/index.md
      - Trading service: recipes/trading-service.md
  - Migration: migration/index.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            members_order: source

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/louishwh
  version:
    provider: mike
    default: latest
